spring:
  application:
    name: dico-scan

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dicoscan}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:12345}
    hikari:
      # Cloud SQL f1-micro handles max ~25 connections
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    open-in-view: false             # CRITICAL: Prevent "open session in view" anti-pattern
    hibernate:
      ddl-auto: validate            # Flyway manages schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: ${HIBERNATE_STATS:false} # Enable in dev/test for N+1 detection
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    repair-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=3600s

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== App-specific config =====
app:
  off:
    base-url: https://world.openfoodfacts.org/api/v2
    connect-timeout-ms: 1000
    read-timeout-ms: 3000
    user-agent: "DicoScan - iOS/Android - Version 1.0 - www.dico-scan.com"
  ai:
    timeout-ms: 2000
    max-ingredients-length: 1500
    gemini-key: "AIzaSyANuKeui0hunDELkU-kkd3Ue0tcjV5BQ14"
    gemini-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
  product-cache:
    ttl-days: 90   # Products older than 90 days are considered stale

# ===== Resilience4j =====
resilience4j:
  retry:
    instances:
      offApi:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  circuitbreaker:
    instances:
      offApi:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
